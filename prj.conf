# BLE Switch: BLE peripheral + GPIO/PWM (nRF5340 DK app core + net core HCI RPMsg)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="BLE Switch"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_SMP=y
CONFIG_BT_APP_PASSKEY=y
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y

# Match Host ACL TX buffers to Controller's ACL packets
CONFIG_BT_BUF_ACL_TX_COUNT=7

# nRF5340 split configuration: Host on application core, Controller on network core via RPMsg.
CONFIG_BT_HCI=y
CONFIG_BT_HCI_RAW=n
CONFIG_RPMSG_SERVICE=y

# Enable FPU and hard-float ABI on app core to match Rust (thumbv8m.main-none-eabihf).
CONFIG_FPU=y
CONFIG_FP_HARDABI=y

CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
