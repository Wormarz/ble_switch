# BLE Switch: BLE peripheral + GPIO/PWM (nRF5340 DK app core + net core HCI RPMsg)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="BLE Switch"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_SMP=y
CONFIG_BT_APP_PASSKEY=y
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y

# nRF5340 split configuration: Host on application core, Controller on network core via RPMsg.
CONFIG_BT_HCI=y
CONFIG_BT_HCI_RAW=n
CONFIG_RPMSG_SERVICE=y

CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
